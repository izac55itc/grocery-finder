<script>
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');
}

let installPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  installPrompt = e;
  window.__installPrompt = installPrompt;
});
