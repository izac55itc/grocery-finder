name: Scrape Grocery Prices

on:
  schedule:
    - cron: '0 14,20,1 * * *'  # 2 PM, 8 PM, 1 AM UTC = 6 AM, 12 PM, 5 PM PST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci
      - name: Install Chromium (first run or cache miss)
        working-directory: scraper
        run: npx playwright install chromium --with-deps
      - name: Run scraper
        working-directory: scraper
        timeout-minutes: 15
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: timeout --signal=KILL 1200 node index.js || true
